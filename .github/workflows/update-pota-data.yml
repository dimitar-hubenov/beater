name: Update POTA Parks Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # every Monday at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run data update script
        run: node scripts/update-reference-data.mjs

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain public/data | grep .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-pota-parks
          delete-branch: true
          commit-message: "chore(data): update POTA parks list"
          title: "chore(data): update POTA parks list"
          body: |
            Automated update of the POTA parks dataset.

            - Source: https://pota.app/all_parks_ext.csv
            - Generated JSON + checksum
            - Deterministic conversion

            Please review and merge when ready.
          base: master
