# PR Checks & Preview Workflow
# This workflow runs tests and builds the project on pull requests.
# If the tests pass, it deploys a preview of the changes to GitHub Pages in a subfolder.
# When the PR is closed, it cleans up the preview from GitHub Pages.

name: PR Checks & Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      data_only: ${{ steps.filter.outputs.data_only }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            data_only:
              - 'public/data/**'

  test-and-build:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 'lts/*'
          - 'current'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: RRun tests
        run: npm run test:run

  comment-skip-preview:
    name: Explain skipped preview
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.changes.outputs.data_only == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ℹ️ **Preview deployment skipped**

            This pull request only changes static data files under `public/data/`.
            No UI or code changes were detected, so a preview build was not necessary.

  deploy-preview:
    name: Deploy PR Preview
    needs: [test-and-build, changes]
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.changes.outputs.data_only != 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Build with PR base path
        run: |
          npm run build -- --base=/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🚀 **PR Preview Ready**
            🔗 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

  cleanup-preview:
    name: Cleanup PR preview
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      needs.changes.outputs.data_only != 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Create empty directory
        run: mkdir -p /tmp/empty

      - name: Remove PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: /tmp/empty
          destination_dir: pr-${{ github.event.pull_request.number }}
